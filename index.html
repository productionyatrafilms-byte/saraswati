  <script src="./assets/js/app.js"></script>
  <script>
  const popupVideo = document.getElementById("popupVideo");
  const customVideoBtn = document.getElementById("customVideoBtn");
  const videoBtnIcon = document.getElementById("videoBtnIcon");
  const videoBox = document.getElementById("videoBox");
  const closeVideo = document.getElementById("closeVideo");

  const playIcon = "./assets/images/video-pause-btn.png";

  // keep video paused by default
  popupVideo.pause();

  function updateVideoState() {
    if (popupVideo.paused) {
      videoBtnIcon.src = playIcon;
      videoBtnIcon.alt = "Play";
      videoBox.classList.remove("playing");
    } else {
      videoBox.classList.add("playing");
    }
  }

  // play only from button click
  customVideoBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    popupVideo.play();
  });

  // clicking video pauses it and shows play button
  popupVideo.addEventListener("click", function () {
    if (!popupVideo.paused) {
      popupVideo.pause();
    }
  });

  popupVideo.addEventListener("play", updateVideoState);
  popupVideo.addEventListener("pause", updateVideoState);

  closeVideo.addEventListener("click", function () {
    popupVideo.pause();
    popupVideo.currentTime = 0;
    updateVideoState();
  });

  updateVideoState();
</script>
