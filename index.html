<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <script>
      // Keep the completed entrance transition when returning to this page.
      // This runs before the page is drawn, so the transition does not flash
      // or restart while coming back from a topic page.
      const INDEX_TRANSITION_KEY =
        "deviSaraswatiIndexTransitionCompleted";

      if (
        localStorage.getItem(
          INDEX_TRANSITION_KEY,
        ) === "true"
      ) {
        document.documentElement.classList.add(
          "restore-index-transition",
        );
      }
    </script>

    <style>
      /* Show every entrance animation in its final state on a return visit. */
      .restore-index-transition *,
      .restore-index-transition *::before,
      .restore-index-transition *::after {
        animation-duration: 0.001s !important;
        animation-delay: -999s !important;
        transition-duration: 0s !important;
        transition-delay: 0s !important;
      }
    </style>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title data-lang-key="title"></title>

    <link
      rel="stylesheet"
      href="./assets/css/style.css"
    />
  </head>

  <body class="page-fade">
    <div class="page-content">
      <!-- Main video play button -->
      <div
        class="video-play-btn"
        id="videoPlayBtn"
      >

        <span data-lang-key="start"></span>
      </div>

      <!-- Home button -->
      <div class="home-button home-btn">
        <img
          src="./assets/images/home-btn.png"
          alt="Home"
        />
      </div>

      <!-- Page title -->
      <div class="page-title">
        <img
          src="./assets/images/title.png"
          alt=""
        />

        <span data-lang-key="title"></span>
      </div>

      <!-- Language buttons -->
      <div class="language-container">
        <div class="english-button active">
          E
        </div>

        <div class="hindi-button">
          H
        </div>

        <div class="gujrati-button">
          G
        </div>
      </div>

      <!-- Left decoration -->
      <div class="left-design">
        <img
          src="./assets/images/Group 1.png"
          alt=""
        />
      </div>

      <!-- Right decoration -->
      <div class="right-design">
        <img
          src="./assets/images/Group 2.png"
          alt=""
        />
      </div>

      <!-- Center content -->
      <div class="center">
        <div class="mandala">
          <img
            src="./assets/images/mandala.png"
            alt=""
          />
        </div>

        <div class="flower">
          <img
            src="./assets/images/design 1.png"
            alt=""
          />
        </div>

        <div class="shadow">
          <img
            src="./assets/images/shadow.png"
            alt=""
          />
        </div>

        <div class="devi-img">
          <img
            src="./assets/images/devi_ 1.png"
            alt="Devi Saraswati"
          />
        </div>

        <span data-lang-key="title"></span>
      </div>

      <!-- Topics -->
      <div class="topics">
        <a
          href="who-is-devi-saraswati.html?section=1"
          class="topic-1 topic"
        >
          <img
            src="./assets/images/Group 1321314345.png"
            alt=""
          />

          <span data-lang-key="topic-1"></span>
        </a>

        <a
          href="who-is-devi-saraswati.html?section=2"
          class="topic-2 topic"
        >
          <img
            src="./assets/images/Group 1321314345.png"
            alt=""
          />

          <span data-lang-key="topic-2"></span>
        </a>

        <a
          href="who-is-devi-saraswati.html?section=3"
          class="topic-3 topic"
        >
          <img
            src="./assets/images/Group 1321314345.png"
            alt=""
          />

          <span data-lang-key="topic-3"></span>
        </a>
      </div>
    </div>

    <!-- Video popup -->
    <div
      class="video-overlay"
      id="videoOverlay"
    >
      <div
        class="video-box"
        id="videoBox"
      >
        <!-- Close button -->
        <button
          class="close-video"
          id="closeVideo"
          type="button"
          aria-label="Close video"
        >
          <img
            src="./assets/images/close-btn.png"
            alt="Close"
          />
        </button>

        <!--
          MP4 is recommended because browsers may not
          properly support MKV files.

          Convert:
          He Sharde Maa.mkv
          into:
          He Sharde Maa.mp4
        -->
        <video
          id="popupVideo"
          loop
          preload="metadata"
          playsinline
        >
          <source
            src="./assets/videos/He Sharde Maa_.mp4"
          />

          Your browser does not support the video tag.
        </video>

        <!-- Video play/pause button -->
        <button
          class="custom-video-btn"
          id="customVideoBtn"
          type="button"
          aria-label="Play or pause video"
        >
          <img
            id="videoBtnIcon"
            src="./assets/images/video-pause-btn.png"
            alt="Play"
          />
        </button>
      </div>
    </div>

    <script src="./assets/js/app.js"></script>

    <script>
      // ===== Video Elements =====
      const popupVideo =
        document.getElementById("popupVideo");

      const customVideoBtn =
        document.getElementById(
          "customVideoBtn",
        );

      const videoBtnIcon =
        document.getElementById(
          "videoBtnIcon",
        );

      const videoBox =
        document.getElementById("videoBox");

      const videoOverlay =
        document.getElementById(
          "videoOverlay",
        );

      const closeVideo =
        document.getElementById("closeVideo");

      const videoPlayBtn =
        document.getElementById(
          "videoPlayBtn",
        );

      const playIcon =
        "./assets/images/video-pause-btn.png";

      // ===== Audio Files =====
      const englishAudio = new Audio(
        "./assets/audio/Eng.mpeg",
      );

      const hindiAudio = new Audio(
        "./assets/audio/Hin.mpeg",
      );

      const gujratiAudio = new Audio(
        "./assets/audio/Guj.mpeg",
      );

      const videoPlayAudio = new Audio(
        "./assets/audio/transition/1.mp3",
      );

      const flowerAudio = new Audio(
        "./assets/audio/transition/5.mp3",
      );

      const topicAudio = new Audio(
        "./assets/audio/topic_home-btn_back-btn/3.mp3",
      );

      const homeAudio = new Audio(
        "./assets/audio/pop.mp3",
      );

      // ===== Other Elements =====
      const englishBtn =
        document.querySelector(
          ".english-button",
        );

      const hindiBtn =
        document.querySelector(
          ".hindi-button",
        );

      const gujratiBtn =
        document.querySelector(
          ".gujrati-button",
        );

      const flower =
        document.querySelector(".flower");

      const flowerSpan =
        document.querySelector(
          ".center > span",
        );

      const topicLinks =
        document.querySelectorAll(".topic");

      const homeBtn =
        document.querySelector(".home-btn");

      // Remember that this page's entrance transition has already run.
      // Topic-page navigation does not clear this value.
      localStorage.setItem(
        INDEX_TRANSITION_KEY,
        "true",
      );

      // ===== Play Audio =====
      function playAudio(audio) {
        if (!audio) return;

        audio.pause();
        audio.currentTime = 0;

        audio
          .play()
          .catch(function (error) {
            console.log(
              "Audio play failed:",
              error,
            );
          });
      }

      // ===== Update Video State =====
      function updateVideoState() {
        if (
          !popupVideo ||
          !videoBox ||
          !videoBtnIcon
        ) {
          return;
        }

        if (popupVideo.paused) {
          videoBtnIcon.src = playIcon;
          videoBtnIcon.alt = "Play";

          videoBox.classList.remove(
            "playing",
          );
        } else {
          videoBtnIcon.alt = "Pause";

          videoBox.classList.add(
            "playing",
          );
        }
      }

      // ===== Open and Play Video =====
      function openAndPlayVideo() {
        if (
          !popupVideo ||
          !videoOverlay ||
          !videoBox
        ) {
          return;
        }

        playAudio(videoPlayAudio);

        // Support both possible CSS class names.
        videoOverlay.classList.add("show");
        videoOverlay.classList.add("active");

        videoBox.classList.add("show");
        videoBox.classList.add("active");

        popupVideo
          .play()
          .then(function () {
            updateVideoState();
          })
          .catch(function (error) {
            console.log(
              "Video play failed:",
              error,
            );

            updateVideoState();
          });
      }

      // ===== Close Video Popup =====
      function closeVideoPopup() {
        if (
          !popupVideo ||
          !videoOverlay ||
          !videoBox
        ) {
          return;
        }

        popupVideo.pause();
        popupVideo.currentTime = 0;

        videoOverlay.classList.remove(
          "show",
        );

        videoOverlay.classList.remove(
          "active",
        );

        videoBox.classList.remove("show");
        videoBox.classList.remove(
          "active",
        );

        videoBox.classList.remove(
          "playing",
        );

        updateVideoState();
      }

      // ===== Main Video Button =====
      if (videoPlayBtn) {
        videoPlayBtn.addEventListener(
          "click",
          function (event) {
            event.preventDefault();

            // Prevent another handler in app.js
            // from immediately pausing the video.
            event.stopImmediatePropagation();

            openAndPlayVideo();
          },
          true,
        );
      }

      // ===== Custom Play/Pause Button =====
      if (customVideoBtn) {
        customVideoBtn.addEventListener(
          "click",
          function (event) {
            event.preventDefault();
            event.stopPropagation();

            if (!popupVideo) return;

            if (popupVideo.paused) {
              popupVideo
                .play()
                .catch(function (error) {
                  console.log(
                    "Video play failed:",
                    error,
                  );
                });
            } else {
              popupVideo.pause();
            }
          },
        );
      }

      // ===== Video Events =====
      if (popupVideo) {
        // Clicking the playing video pauses it.
        popupVideo.addEventListener(
          "click",
          function () {
            if (!popupVideo.paused) {
              popupVideo.pause();
            }
          },
        );

        popupVideo.addEventListener(
          "play",
          updateVideoState,
        );

        popupVideo.addEventListener(
          "pause",
          updateVideoState,
        );

        popupVideo.addEventListener(
          "ended",
          updateVideoState,
        );

        popupVideo.addEventListener(
          "error",
          function () {
            console.error(
              "The video could not be loaded. Check the file path and video format.",
            );
          },
        );
      }

      // ===== Close Video Button =====
      if (closeVideo) {
        closeVideo.addEventListener(
          "click",
          function (event) {
            event.preventDefault();
            event.stopPropagation();

            closeVideoPopup();
          },
        );
      }

      // Close the popup by clicking outside
      // the video box.
      if (videoOverlay) {
        videoOverlay.addEventListener(
          "click",
          function (event) {
            if (
              event.target === videoOverlay
            ) {
              closeVideoPopup();
            }
          },
        );
      }

      // ===== Language Audio =====
      if (englishBtn) {
        englishBtn.addEventListener(
          "click",
          function () {
            playAudio(englishAudio);
          },
        );
      }

      if (hindiBtn) {
        hindiBtn.addEventListener(
          "click",
          function () {
            playAudio(hindiAudio);
          },
        );
      }

      if (gujratiBtn) {
        gujratiBtn.addEventListener(
          "click",
          function () {
            playAudio(gujratiAudio);
          },
        );
      }

      // ===== Flower Audio =====
      if (flower) {
        flower.style.cursor = "pointer";

        flower.addEventListener(
          "click",
          function () {
            playAudio(flowerAudio);
          },
        );
      }

      if (flowerSpan) {
        flowerSpan.style.cursor =
          "pointer";

        flowerSpan.addEventListener(
          "click",
          function () {
            playAudio(flowerAudio);
          },
        );
      }

      // ===== Home Button =====
      if (homeBtn) {
        homeBtn.style.cursor = "pointer";

        homeBtn.addEventListener(
          "click",
          function (event) {
            event.preventDefault();

            // Only this page's home button resets the saved transition.
            localStorage.removeItem(
              INDEX_TRANSITION_KEY,
            );

            playAudio(homeAudio);

            setTimeout(function () {
              window.location.href =
                "index.html";
            }, 500);
          },
        );
      }

      // ===== Topic Links =====
      topicLinks.forEach(function (topic) {
        topic.addEventListener(
          "click",
          function (event) {
            event.preventDefault();

            const pageLink =
              topic.getAttribute("href");

            playAudio(topicAudio);

            setTimeout(function () {
              window.location.href =
                pageLink;
            }, 800);
          },
        );
      });

      updateVideoState();
    </script>
  </body>
</html>
